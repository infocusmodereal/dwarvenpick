services:
    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_USER: dwarvenpick
            POSTGRES_PASSWORD: dwarvenpick
            POSTGRES_DB: dwarvenpick
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U dwarvenpick -d dwarvenpick"]
            interval: 2s
            timeout: 2s
            retries: 30

    backend:
        build:
            context: ../..
            dockerfile: deploy/docker/Dockerfile.backend
            args:
                DWARVENPICK_VERSION: ${DWARVENPICK_VERSION:-0.0.0-local}
                DWARVENPICK_SOURCE_SHA: ${DWARVENPICK_SOURCE_SHA:-local}
                DWARVENPICK_SOURCE_REF: ${DWARVENPICK_SOURCE_REF:-local}
                DWARVENPICK_IMAGE_TAG: ${DWARVENPICK_IMAGE_TAG:-local}
                DWARVENPICK_BUILD_TAG: ${DWARVENPICK_BUILD_TAG:-local}
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dwarvenpick
            SPRING_DATASOURCE_USERNAME: dwarvenpick
            SPRING_DATASOURCE_PASSWORD: dwarvenpick
            DWARVENPICK_AUTH_OIDC_ENABLED: "false"
            DWARVENPICK_AUTH_LOCAL_ENABLED: "true"
            DWARVENPICK_SEED_ENABLED: "true"
            DWARVENPICK_SEED_POSTGRES_HOST: postgres
            DWARVENPICK_SEED_POSTGRES_PORT: 5432
            DWARVENPICK_SEED_POSTGRES_DATABASE: dwarvenpick
            DWARVENPICK_SEED_POSTGRES_USERNAME: dwarvenpick
            DWARVENPICK_SEED_POSTGRES_PASSWORD: dwarvenpick
            # Unresolved inert seeds require the default empty CIDR policy and allow-private-networks=true.
            DWARVENPICK_SEED_MYSQL_HOST: mysql.unavailable.invalid
            DWARVENPICK_SEED_MYSQL_PORT: 3306
            DWARVENPICK_SEED_MYSQL_DATABASE: unavailable
            DWARVENPICK_SEED_MYSQL_USERNAME: unavailable
            DWARVENPICK_SEED_MYSQL_PASSWORD: unavailable
            DWARVENPICK_SEED_MARIADB_HOST: mariadb.unavailable.invalid
            DWARVENPICK_SEED_MARIADB_PORT: 3306
            DWARVENPICK_SEED_MARIADB_DATABASE: unavailable
            DWARVENPICK_SEED_MARIADB_USERNAME: unavailable
            DWARVENPICK_SEED_MARIADB_PASSWORD: unavailable
            DWARVENPICK_SEED_STARROCKS_HOST: starrocks.unavailable.invalid
            DWARVENPICK_SEED_STARROCKS_PORT: 9030
            DWARVENPICK_SEED_STARROCKS_DATABASE: unavailable
            DWARVENPICK_SEED_STARROCKS_USERNAME: unavailable
            DWARVENPICK_SEED_STARROCKS_PASSWORD: unavailable
            DWARVENPICK_SEED_VERTICA_HOST: vertica.unavailable.invalid
            DWARVENPICK_SEED_VERTICA_PORT: 5433
            DWARVENPICK_SEED_VERTICA_DATABASE: unavailable
            DWARVENPICK_SEED_VERTICA_USERNAME: unavailable
            DWARVENPICK_SEED_VERTICA_PASSWORD: unavailable
            DWARVENPICK_SEED_AEROSPIKE_HOST: aerospike.unavailable.invalid
            DWARVENPICK_SEED_AEROSPIKE_PORT: 3000
            DWARVENPICK_SEED_AEROSPIKE_DATABASE: unavailable
            DWARVENPICK_SEED_AEROSPIKE_USERNAME: unavailable
            DWARVENPICK_SEED_AEROSPIKE_PASSWORD: unavailable
            DWARVENPICK_SEED_TRINO_ENABLED: "false"
            DWARVENPICK_METRICS_PROMETHEUS_ENABLED: "true"
            SERVER_PORT: 8080
        ports:
            - "127.0.0.1:${PERF_BACKEND_PORT:-8080}:8080"
        depends_on:
            postgres:
                condition: service_healthy

    prometheus:
        image: prom/prometheus:v2.53.0@sha256:075b1ba2c4ebb04bc3a6ab86c06ec8d8099f8fda1c96ef6d104d9bb1def1d8bc
        command: ["--config.file=/etc/prometheus/prometheus.yml"]
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
        ports:
            - "127.0.0.1:${PERF_PROMETHEUS_PORT:-9090}:9090"
        depends_on:
            backend:
                condition: service_started
