# Example: OIDC authentication enabled (Keycloak), local auth disabled.
#
# Prereqs:
# - A Keycloak realm (or other OIDC issuer) reachable from the cluster.
# - A credential master key secret.

image:
  repository: ghcr.io/your-org/dwarvenpick-backend
  tag: latest

env:
  SPRING_PROFILES_ACTIVE: prod
  DWARVENPICK_AUTH_LOCAL_ENABLED: "false"
  DWARVENPICK_AUTH_OIDC_ENABLED: "true"
  DWARVENPICK_AUTH_OIDC_ISSUER_URI: "https://keycloak.example.com/realms/dwarvenpick"
  DWARVENPICK_AUTH_OIDC_CLIENT_ID: "dwarvenpick"
  DWARVENPICK_AUTH_OIDC_CLIENT_SECRET: "change-me"
  DWARVENPICK_AUTH_OIDC_SYSTEM_ADMIN_GROUPS: "dwarvenpick-admins"

credentials:
  masterKey:
    existingSecret: dwarvenpick-credentials

metrics:
  prometheus:
    enabled: true

# Enable a writable, persistent external driver directory so admins can upload JDBC jars.
drivers:
  external:
    enabled: true
    createPvc: true
    pvc:
      size: 1Gi
