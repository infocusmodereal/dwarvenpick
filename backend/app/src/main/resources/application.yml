spring:
  application:
    name: dwarvenpick-backend
  jackson:
    default-property-inclusion: non_null
  session:
    store-type: jdbc
    jdbc:
      # Flyway owns the application schema, including Spring Session tables.
      initialize-schema: never
  flyway:
    enabled: ${DWARVENPICK_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: ${DWARVENPICK_METRICS_PROMETHEUS_ENABLED:true}
  health:
    ldap:
      enabled: false

server:
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    session:
      timeout: ${DWARVENPICK_SESSION_TIMEOUT:8h}
      cookie:
        http-only: true
        secure: ${DWARVENPICK_SESSION_COOKIE_SECURE:false}
        same-site: lax

dwarvenpick:
  query:
    default-page-size: 500
    max-page-size: 1000
    max-buffered-rows: 5000
    max-buffered-bytes: 67108864
    max-buffered-bytes-per-instance: 268435456
    max-cell-bytes: 1048576
    max-export-rows: 5000
    jdbc-fetch-size: 500
    max-concurrency-per-user: 5
    admission-timeout-seconds: ${DWARVENPICK_QUERY_ADMISSION_TIMEOUT_SECONDS:10}
    result-session-ttl-seconds: 600
    execution-retention-seconds: 3600
    cancel-grace-period-ms: 500
    cleanup-interval-ms: 30000
    shutdown-grace-period-seconds: 15
    history-retention-days: 30
    audit-retention-days: 90
    query-text-redaction-days: 7
    retention-cleanup-interval-ms: 3600000
    active-execution-stale-seconds: 120
    pool-metrics-stale-seconds: 120
    require-write-justification: ${DWARVENPICK_QUERY_REQUIRE_WRITE_JUSTIFICATION:false}
    max-justification-length: ${DWARVENPICK_QUERY_MAX_JUSTIFICATION_LENGTH:1000}
  resources:
    version-retention-days: 180
    max-versions-per-resource: 100
    retention-cleanup-interval-ms: 3600000
  web:
    async:
      core-pool-size: ${DWARVENPICK_WEB_ASYNC_CORE_POOL_SIZE:4}
      max-pool-size: ${DWARVENPICK_WEB_ASYNC_MAX_POOL_SIZE:16}
      queue-capacity: ${DWARVENPICK_WEB_ASYNC_QUEUE_CAPACITY:100}
      request-timeout-ms: ${DWARVENPICK_WEB_ASYNC_REQUEST_TIMEOUT_MS:300000}
  security:
    credentials:
      active-key-id: ${DWARVENPICK_CREDENTIAL_ACTIVE_KEY_ID:v1}
      master-key: ${DWARVENPICK_CREDENTIAL_MASTER_KEY:dwarvenpick-dev-master-key-change-me}
  drivers:
    external-dir: ${DWARVENPICK_EXTERNAL_DRIVERS_DIR:/opt/app/drivers}
    uploads-enabled: ${DWARVENPICK_DRIVERS_UPLOADS_ENABLED:false}
    maven:
      enabled: ${DWARVENPICK_DRIVERS_MAVEN_ENABLED:false}
      repository-url: ${DWARVENPICK_DRIVERS_MAVEN_REPOSITORY_URL:https://repo1.maven.org/maven2/}
      max-jar-size-mb: ${DWARVENPICK_DRIVERS_MAVEN_MAX_JAR_SIZE_MB:50}
  datasource:
    network-guard:
      enabled: true
      allow-private-networks: true
      allow-host-patterns: []
      deny-host-patterns: []
      allow-cidrs: []
      deny-cidrs: []
  schema:
    cache-ttl-seconds: 300
    max-schemas: 100
    max-tables-per-schema: 100
    max-columns-per-table: 200
  auth:
    local:
      enabled: true
    password-policy:
      min-length: 10
      require-uppercase: true
      require-lowercase: true
      require-digit: true
    ldap:
      enabled: false
      url: ""
      bind-dn: ""
      bind-password: ""
      user-search-base: ""
      user-filter: "(uid={0})"
      attribute-mapping:
        username: uid
        display-name: cn
        email: mail
      group-sync:
        enabled: true
        group-search-base: ""
        group-filter: "(member={0})"
        group-name-attribute: cn
        mapping-rules: {}
      mock:
        enabled: false
        users: []
    oidc:
      enabled: false
      issuer-uri: ""
      authorization-uri: ""
      token-uri: ""
      jwk-set-uri: ""
      user-info-uri: ""
      client-id: ""
      client-secret: ""
      scopes: ["openid", "profile", "email"]
      redirect-uri-template: "{baseUrl}/login/oauth2/code/{registrationId}"
      claim-mapping:
        username: preferred_username
        display-name: name
        email: email
        groups: groups
      group-sync:
        enabled: true
        mapping-rules: {}
      system-admin-groups: []
