name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  osv-scan:
    name: OSV Dependency Scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      upload-sarif: false
      scan-args: |-
        --recursive
        ./
    permissions:
      actions: read
      contents: read
      security-events: write

  backend:
    name: Backend Lint + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant gradlew permissions
        run: chmod +x gradlew

      - name: Run backend checks
        run: ./gradlew clean ktlintCheck test

      - name: Generate backend runtime dependency report
        run: |
          mkdir -p build/reports/security
          ./gradlew :backend:app:dependencies --configuration runtimeClasspath > build/reports/security/backend-runtime-dependencies.txt

      - name: Upload backend dependency report
        uses: actions/upload-artifact@v4
        with:
          name: backend-runtime-dependencies
          path: build/reports/security/backend-runtime-dependencies.txt

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate repository SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

  frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Test
        run: npm test

      - name: Package smoke test
        run: npm pack --dry-run

  perf-tooling:
    name: Performance Tooling Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: "0.53.0"

      - name: Test performance tooling
        run: node --test scripts/perf/*.test.mjs

      - name: Inspect k6 workload
        run: k6 inspect scripts/perf/query-load.k6.js
