name: Manual Query Performance Smoke

on:
    workflow_dispatch:
        inputs:
            release_ref:
                description: Release tag to test, for example v0.19.0
                required: true
                type: string

permissions:
    contents: read

jobs:
    local-query-smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.release_ref }}

            - name: Resolve release identity
              shell: bash
              env:
                  RELEASE_REF: ${{ inputs.release_ref }}
              run: |
                  if [[ ! "$RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "release_ref must be a semantic release tag such as v0.19.0." >&2
                      exit 1
                  fi
                  echo "DWARVENPICK_VERSION=${RELEASE_REF#v}" >> "$GITHUB_ENV"
                  echo "DWARVENPICK_SOURCE_REF=$RELEASE_REF" >> "$GITHUB_ENV"
                  echo "DWARVENPICK_SOURCE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
                  echo "DWARVENPICK_IMAGE_TAG=perf-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
                  echo "DWARVENPICK_BUILD_TAG=github-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Setup k6
              uses: grafana/setup-k6-action@v1
              with:
                  k6-version: "0.53.0"

            - name: Start minimal Dwarvenpick stack
              run: docker compose -f deploy/perf/docker-compose.yml up --build -d

            - name: Wait for backend health
              run: |
                  for attempt in $(seq 1 120); do
                      if curl -fsS http://127.0.0.1:8080/actuator/health/readiness >/dev/null; then
                          exit 0
                      fi
                      if ! docker compose -f deploy/perf/docker-compose.yml ps --status running --quiet backend | grep -q .; then
                          docker compose -f deploy/perf/docker-compose.yml logs backend
                          exit 1
                      fi
                      sleep 5
                  done
                  docker compose -f deploy/perf/docker-compose.yml logs backend
                  exit 1

            - name: Wait for Prometheus scrape
              run: |
                  for attempt in $(seq 1 30); do
                      if curl -fsS --get \
                          --data-urlencode 'query=up{job="dwarvenpick-backend"}' \
                          http://127.0.0.1:9090/api/v1/query \
                          | jq -e '.data.result[0].value[1] == "1"' >/dev/null; then
                          exit 0
                      fi
                      sleep 2
                  done
                  docker compose -f deploy/perf/docker-compose.yml logs prometheus
                  exit 1

            - name: Run local query smoke
              env:
                  PERF_TARGET_ENV: local
                  BASE_URL: http://127.0.0.1:8080
                  DWARVENPICK_AUTH: local
                  DWARVENPICK_USER: admin
                  DWARVENPICK_PASSWORD: Admin1234!
                  DATASOURCE_ID: postgresql-core
                  CREDENTIAL_PROFILE: admin-ro
                  SQL: SELECT generate_series(1, 250) AS value;
                  PAGE_SIZE: "100"
                  MAX_RESULT_PAGES: "3"
                  PERF_PROFILE: smoke
                  VUS: "1"
                  DURATION: 30s
                  CAPTURE_APP_METRICS: "true"
                  PROMETHEUS_URL: http://127.0.0.1:9090
                  PROMETHEUS_NAMESPACE: dwarvenpick-local
                  REPORT_DIR: build/reports/perf
                  EXPECTED_SOURCE_REF: ${{ inputs.release_ref }}
                  EXPECTED_SOURCE_SHA: ${{ env.DWARVENPICK_SOURCE_SHA }}
                  EXPECTED_IMAGE_TAG: ${{ env.DWARVENPICK_IMAGE_TAG }}
                  EXPECTED_BUILD_TAG: ${{ env.DWARVENPICK_BUILD_TAG }}
              run: scripts/perf/run-query-smoke.sh

            - name: Capture compose logs on failure
              if: failure()
              run: docker compose -f deploy/perf/docker-compose.yml logs --no-color

            - name: Upload sanitized performance artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: query-performance-smoke
                  path: build/reports/perf
                  if-no-files-found: warn

            - name: Stop minimal Dwarvenpick stack
              if: always()
              run: docker compose -f deploy/perf/docker-compose.yml down -v
