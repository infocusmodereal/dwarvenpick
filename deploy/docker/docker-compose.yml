services:
  postgres:
    image: postgres:15-alpine
    container_name: dwarvenpick-postgres
    environment:
      POSTGRES_USER: dwarvenpick
      POSTGRES_PASSWORD: dwarvenpick
      POSTGRES_DB: dwarvenpick
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: dwarvenpick-mysql
    environment:
      MYSQL_ROOT_PASSWORD: dwarvenpick
      MYSQL_DATABASE: orders
      MYSQL_USER: readonly
      MYSQL_PASSWORD: readonly
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  mariadb:
    image: mariadb:11.8
    container_name: dwarvenpick-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: dwarvenpick
      MARIADB_DATABASE: warehouse
      MARIADB_USER: readonly
      MARIADB_PASSWORD: readonly
    ports:
      - "3307:3306"
    volumes:
      - mariadbdata:/var/lib/mysql
      - ./mariadb-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  starrocks:
    image: starrocks/allin1-ubuntu:3.1.7
    container_name: dwarvenpick-starrocks
    # StarRocks persists its full /data tree. On restart, FE can refuse to start if a stale
    # pid file collides with a different supervised process id. Clean it up before boot.
    command:
      - sh
      - -lc
      - |
        rm -f /data/deploy/starrocks/fe/bin/fe.pid
        exec /data/deploy/entrypoint.sh
    ports:
      - "9030:9030"
      - "8030:8030"
    volumes:
      - starrocksdata:/data

  starrocks-seed:
    image: mysql:8.4
    container_name: dwarvenpick-starrocks-seed
    depends_on:
      - starrocks
    volumes:
      - ./starrocks-init.sql:/seed.sql:ro
    entrypoint:
      - sh
      - -c
      - |
        set -e
        until mysql -h starrocks -P 9030 -uroot -e "SELECT 1" >/dev/null 2>&1; do
          echo "Waiting for StarRocks..."
          sleep 2
        done
        mysql -h starrocks -P 9030 -uroot < /seed.sql
        echo "StarRocks seeded."
    restart: "no"

  trino:
    image: trinodb/trino:479
    container_name: dwarvenpick-trino
    ports:
      - "8088:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: dwarvenpick-keycloak
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro

  backend:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: dwarvenpick-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dwarvenpick
      SPRING_DATASOURCE_USERNAME: dwarvenpick
      SPRING_DATASOURCE_PASSWORD: dwarvenpick
      DWARVENPICK_SEED_POSTGRES_HOST: postgres
      DWARVENPICK_SEED_POSTGRES_PORT: 5432
      DWARVENPICK_SEED_POSTGRES_DATABASE: dwarvenpick
      DWARVENPICK_SEED_POSTGRES_USERNAME: dwarvenpick
      DWARVENPICK_SEED_POSTGRES_PASSWORD: dwarvenpick
      DWARVENPICK_SEED_MYSQL_HOST: mysql
      DWARVENPICK_SEED_MYSQL_PORT: 3306
      DWARVENPICK_SEED_MYSQL_DATABASE: orders
      DWARVENPICK_SEED_MYSQL_USERNAME: readonly
      DWARVENPICK_SEED_MYSQL_PASSWORD: readonly
      DWARVENPICK_SEED_MARIADB_HOST: mariadb
      DWARVENPICK_SEED_MARIADB_PORT: 3306
      DWARVENPICK_SEED_MARIADB_DATABASE: warehouse
      DWARVENPICK_SEED_MARIADB_USERNAME: readonly
      DWARVENPICK_SEED_MARIADB_PASSWORD: readonly
      DWARVENPICK_SEED_TRINO_HOST: trino
      DWARVENPICK_SEED_TRINO_PORT: 8080
      DWARVENPICK_SEED_TRINO_DATABASE: tpch/sf1
      DWARVENPICK_SEED_TRINO_USERNAME: trino
      DWARVENPICK_SEED_TRINO_PASSWORD: ""
      DWARVENPICK_SEED_STARROCKS_HOST: starrocks
      DWARVENPICK_SEED_STARROCKS_PORT: 9030
      DWARVENPICK_SEED_STARROCKS_DATABASE: warehouse
      DWARVENPICK_SEED_STARROCKS_USERNAME: root
      DWARVENPICK_SEED_STARROCKS_PASSWORD: ""
      DWARVENPICK_AUTH_OIDC_ENABLED: "true"
      # Use the host-reachable issuer so ID token `iss` validation matches what the browser sees.
      DWARVENPICK_AUTH_OIDC_ISSUER_URI: "http://localhost:8081/realms/dwarvenpick"
      # Browser-side OIDC redirect must target a host-reachable IdP URL.
      DWARVENPICK_AUTH_OIDC_AUTHORIZATION_URI: "http://localhost:8081/realms/dwarvenpick/protocol/openid-connect/auth"
      # Backchannel endpoints (token/JWK/userinfo) should stay on the Docker network so the backend can reach them.
      DWARVENPICK_AUTH_OIDC_TOKEN_URI: "http://keycloak:8080/realms/dwarvenpick/protocol/openid-connect/token"
      DWARVENPICK_AUTH_OIDC_JWK_SET_URI: "http://keycloak:8080/realms/dwarvenpick/protocol/openid-connect/certs"
      DWARVENPICK_AUTH_OIDC_CLIENT_ID: "dwarvenpick"
      DWARVENPICK_AUTH_OIDC_CLIENT_SECRET: "dwarvenpick-local-secret"
      DWARVENPICK_AUTH_OIDC_REDIRECT_URI_TEMPLATE: "http://localhost:3000/login/oauth2/code/{registrationId}"
      DWARVENPICK_AUTH_OIDC_SYSTEM_ADMIN_GROUPS: "dwarvenpick-admins"
      DWARVENPICK_AUTH_LOCAL_ALLOW_WITH_OIDC: "true"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mysql
      - mariadb
      - trino
      - keycloak
      - starrocks
      - starrocks-seed
    volumes:
      - driversdata:/opt/app/drivers

  frontend:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: dwarvenpick-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  mysqldata:
  mariadbdata:
  starrocksdata:
  driversdata:
